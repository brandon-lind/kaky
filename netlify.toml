[build]
  publish = "dist-ui"
  command = "npm run build"

  [build.environment]
    NODE_VERSION = "24.14.1"

[dev]
  targetPort = "8080"

[functions]
  directory = "./src/api/"
  node_bundler = "esbuild"

[[plugins]]
package = "netlify-plugin-inline-functions-env"
  [plugins.inputs]
  buildEvent = "onBuild"
